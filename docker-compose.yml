version: '3.8'

services:
  mysql:
    image: mysql:8.4
    container_name: mysql_petshop
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root_pwd
      MYSQL_DATABASE: petshop_db

    ports:
      - "3306:3306"

    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data: